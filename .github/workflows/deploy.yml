name: Deploy to Alibaba Cloud ECS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DEPLOY_DIR: /opt/playbook-writer

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            # 安装 Docker（首次部署时自动安装，已有则跳过）
            if ! command -v docker &> /dev/null; then
              curl -fsSL https://get.docker.com | sh
              systemctl enable --now docker
            fi

            # 安装 docker compose plugin（如未安装）
            if ! docker compose version &> /dev/null; then
              apt-get update && apt-get install -y docker-compose-plugin
            fi

            # 拉取最新代码
            if [ ! -d "${{ env.DEPLOY_DIR }}" ]; then
              git clone ${{ secrets.REPO_URL }} ${{ env.DEPLOY_DIR }}
            fi
            cd ${{ env.DEPLOY_DIR }}
            git pull origin main

            # 写入后端环境变量
            echo '${{ secrets.BACKEND_ENV }}' > backend/.env

            # 构建并重启服务
            docker compose down
            docker compose up --build -d

            # 清理悬空镜像
            docker image prune -f
